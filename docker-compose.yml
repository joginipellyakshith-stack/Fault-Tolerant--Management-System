version: '3.8'

services:
  backend:
    build: ./backend
    container_name: devops_backend
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - task-network

  frontend:
    build: ./frontend
    container_name: devops_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - task-network

  monitor:
    build: ./monitor
    container_name: devops_monitor
    volumes:
      # Mount the Docker socket to allow the monitor to restart containers
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - task-network

networks:
  task-network:
    driver: bridge
